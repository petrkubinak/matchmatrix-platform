services:
  postgres:
    image: postgres:16
    container_name: matchmatrix_postgres
    environment:
      POSTGRES_DB: matchmatrix
      POSTGRES_USER: matchmatrix
      POSTGRES_PASSWORD: matchmatrix_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: matchmatrix_redis
    ports:
      - "6379:6379"

volumes:
  pg_data:
